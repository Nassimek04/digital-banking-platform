spring.application.name=digital-banking
server.port=8085

# ========================= DATABASE =========================
# --- H2 in-memory (default: runs instantly, no setup) ---
#spring.datasource.url=jdbc:h2:mem:bank
#spring.datasource.username=sa
#spring.datasource.password=
#spring.h2.console.enabled=true
#spring.h2.console.path=/h2-console
#spring.jpa.hibernate.ddl-auto=create
#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true

# --- MySQL (production): uncomment these and comment the H2 block above ---
spring.datasource.url=jdbc:mysql://localhost:3306/digital_banking?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update

# ========================= JWT / SECURITY =========================
# Use a long random value in production. Override with env var JWT_SECRET.
jwt.secret=${JWT_SECRET:9faf3c1b2e7d4a5f8c0b6e1d9a4f7c2b5e8d1a4f7c0b3e6d9a2f5c8b1e4d7a0f}



$env=OPENAI_API_KEY=""
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.2
spring.ai.openai.embedding.options.model=text-embedding-3-small
# ========================= TELEGRAM =========================
# Get a token from @BotFather, then set TELEGRAM_BOT_TOKEN. Empty = bot disabled.
telegram.bot.token=${TELEGRAM_BOT_TOKEN:}

# ========================= SWAGGER =========================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
